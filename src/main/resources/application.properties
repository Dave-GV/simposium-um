spring.application.name=simposium

# Base de datos (dev)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/simposium}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:MiClaveSecretaMuyLargaYSegura1234567890ABCDEF}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

