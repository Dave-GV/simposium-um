# Perfil LOCAL para desarrollo sin depender de Supabase.
# Usa H2 en memoria para que la app arranque y puedas probar todo el flujo.
# Activar con:  .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"

spring.datasource.url=jdbc:h2:mem:simposium;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# Quitar el schema "dashboard" que es solo de Supabase
spring.jpa.properties.hibernate.default_schema=

# Consola H2 opcional (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
